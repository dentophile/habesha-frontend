<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habesha Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { botOrange: '#FF952B', buna: '#2C1E16' } } } }
    </script>
</head>
<body class="bg-gray-50 font-sans overflow-hidden">

    <!-- Views -->
    <div id="view-swipe" class="w-full h-screen pt-4 pb-20 px-4">
        <h2 class="text-2xl font-bold text-botOrange text-center mb-4">Find Matches</h2>
        <div id="card-container" class="relative w-full h-[60vh] max-w-sm mx-auto">
            <p class="text-center text-gray-500 mt-10">Loading profiles...</p>
        </div>
    </div>

    <div id="view-matches" class="hidden w-full h-screen pt-16 px-4">
        <h2 class="text-2xl font-bold text-buna mb-4">Your Matches</h2>
        <div id="matches-list" class="space-y-4">
            <p class="text-gray-500 italic">No matches yet. Keep swiping! ❤️</p>
        </div>
    </div>

    <!-- Navigation -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 py-3 flex justify-around items-center z-50">
        <button onclick="showView('view-swipe')" class="flex flex-col items-center text-botOrange">
            <i class="ph-fill ph-fire text-2xl"></i>
            <span class="text-[10px] font-bold">Swipe</span>
        </button>
        <button onclick="showView('view-matches')" class="flex flex-col items-center text-gray-400">
            <i class="ph-fill ph-chats-circle text-2xl"></i>
            <span class="text-[10px] font-bold">Matches</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://habesha-backend-xhc5.onrender.com";
        const userTelegramData = tg.initDataUnsafe?.user;

        function showView(viewId) {
            document.getElementById('view-swipe').classList.add('hidden');
            document.getElementById('view-matches').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
            if (viewId === 'view-matches') fetchMatchesList();
            else fetchMatches();
        }

        async function fetchMatches() {
            if (!userTelegramData) return;
            const container = document.getElementById('card-container');
            
            try {
                // FIXED: Now fetching POTENTIAL matches
                const response = await fetch(`${BACKEND_URL}/api/get-potential-matches/${userTelegramData.id}`);
                const data = await response.json();
                
                profiles = data.matches || [];
                currentCardIndex = 0;
                
                if (profiles.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 mt-10">No profiles nearby. Check back later!</p>';
                } else {
                    renderCards();
                }
            } catch (err) {
                container.innerHTML = "Error loading. Check console.";
            }
        }

        async function fetchMatchesList() {
            const list = document.getElementById('matches-list');
            if (!userTelegramData) return;
            try {
                const response = await fetch(`${BACKEND_URL}/api/matches-list/${userTelegramData.id}`);
                const data = await response.json();
                if (data.matches?.length) {
                    list.innerHTML = data.matches.map(m => `<div class="p-3 bg-white rounded-xl shadow-sm">${m.name}</div>`).join('');
                }
            } catch (e) {
                console.error("Error loading matches", e);
            }
        }

        // Initialize
        fetchMatches();
    </script>
</body>
</html>
