<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Habesha Date</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Defensive fix: Wait for tailwind to be defined before setting config
        (function() {
            const checkTailwind = setInterval(() => {
                if (window.tailwind) {
                    window.tailwind.config = { 
                        theme: { 
                            extend: { 
                                colors: { 
                                    botOrange: '#FF952B', 
                                    buna: '#2C1E16' 
                                } 
                            } 
                        } 
                    };
                    clearInterval(checkTailwind);
                }
            }, 50);
        })();
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="reg-container" class="max-w-md mx-auto bg-white min-h-screen shadow-lg p-6">
        <h2 id="reg-title" class="text-2xl font-bold text-buna mb-6 text-center">Step 1: The Basics</h2>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 h-2 rounded-full mb-8 overflow-hidden">
            <div id="progress-bar" class="bg-botOrange h-full w-1/3 transition-all duration-300"></div>
        </div>

        <!-- Page 1: Basics -->
        <div id="page-1" class="space-y-4">
            <input id="reg-name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-xl">
            <div class="flex gap-2">
                <select id="reg-gender" class="w-1/2 p-3 border rounded-xl"><option value="">Gender</option><option>Man</option><option>Woman</option></select>
                <input id="reg-age" type="number" placeholder="Age" min="18" class="w-1/2 p-3 border rounded-xl">
            </div>
            <select id="reg-interest" class="w-full p-3 border rounded-xl"><option value="">Interested In</option><option>Women</option><option>Men</option><option>Everyone</option></select>
            <select id="reg-location" class="w-full p-3 border rounded-xl"><option value="">Living City</option><option>Addis Ababa</option><option>Bahir Dar</option><option>Hawassa</option><option>Diaspora</option></select>
            <button onclick="nextPage(2)" class="w-full p-3 bg-botOrange text-white rounded-xl font-bold mt-4">Next: Lifestyle</button>
        </div>

        <!-- Page 2: Lifestyle & Background -->
        <div id="page-2" class="hidden space-y-4">
            <input id="reg-height" type="text" placeholder="Height (e.g. 1.70m)" class="w-full p-3 border rounded-xl">
            <select id="reg-religion" class="w-full p-3 border rounded-xl"><option value="">Religion</option><option>Orthodox</option><option>Muslim</option><option>Protestant</option><option>Catholic</option></select>
            <select id="reg-education" class="w-full p-3 border rounded-xl"><option value="">Education Level</option><option>High School</option><option>Bachelor's</option><option>Master's</option></select>
            <input id="reg-occupation" type="text" placeholder="Occupation" class="w-full p-3 border rounded-xl">
            <div class="flex gap-2">
                <select id="reg-drinking" class="w-1/2 p-3 border rounded-xl"><option value="">Drinking</option><option>Never</option><option>Socially</option></select>
                <select id="reg-smoking" class="w-1/2 p-3 border rounded-xl"><option value="">Smoking</option><option>Never</option><option>Socially</option></select>
            </div>
            <select id="reg-kids" class="w-full p-3 border rounded-xl"><option value="">Family Plans</option><option>Want kids</option><option>Don't want kids</option></select>
            <button onclick="nextPage(3)" class="w-full p-3 bg-botOrange text-white rounded-xl font-bold mt-4">Next: Bio</button>
        </div>

        <!-- Page 3: About You -->
        <div id="page-3" class="hidden space-y-4">
            <textarea id="reg-bio" placeholder="Tell us about yourself..." class="w-full p-3 border rounded-xl h-32"></textarea>
            <button onclick="submitData()" class="w-full p-3 bg-green-600 text-white rounded-xl font-bold mt-4">Complete Registration</button>
        </div>
    </div>

    <script>
        function nextPage(step) {
            // Age validation check
            if(step === 2) {
                const age = document.getElementById('reg-age').value;
                if(!age || age < 18) { 
                    alert("You must be 18+ to use this app!"); 
                    return; 
                }
            }
            
            document.getElementById('page-1').classList.add('hidden');
            document.getElementById('page-2').classList.add('hidden');
            document.getElementById('page-3').classList.add('hidden');
            document.getElementById('page-' + step).classList.remove('hidden');
            document.getElementById('progress-bar').style.width = (step * 33) + '%';
            document.getElementById('reg-title').innerText = "Step " + step + ": Details";
        }

        function submitData() {
            // Here you gather all values and call your API
            alert("Registration logic triggered!");
        }
    </script>
</body>
</html>
