<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habesha Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Add Phosphor Icons for elegant buttons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        botOrange: '#FF952B',
                        botOrangeLight: '#FFB366',
                        buna: '#2C1E16',
                        lightGray: '#F5F5F5'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F5F5F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling while swiping */
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF952B 0%, #FF7F00 100%);
            color: white;
        }
        .card-stack {
            position: relative;
            width: 100%;
            height: 65vh;
            max-width: 350px;
            perspective: 1000px;
        }
        .swipe-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .swipe-card img {
            width: 100%;
            height: 70%;
            object-fit: cover;
        }
        .card-content {
            padding: 15px;
            height: 30%;
            background: white;
        }
        /* Animation classes */
        .swipe-left { transform: translateX(-150%) rotate(-15deg); opacity: 0; }
        .swipe-right { transform: translateX(150%) rotate(15deg); opacity: 0; }
    </style>
</head>
<body>

    <div class="flex flex-col items-center justify-center min-h-screen text-center w-full px-4">
        
        <!-- VIEW 1: WELCOME SCREEN -->
        <div id="view-welcome" class="w-full flex flex-col items-center transition-all duration-300">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-buna">Habesha Date</h1>
                <h2 class="text-xl font-bold text-botOrange mt-1">ሀበሻ ቀጠሮ ❤️</h2>
                <p class="text-sm text-gray-500 mt-3 px-4">የህይወት አጋርዎን በቀላሉ ያግኙ! አስተማማኝ እና ትክክለኛ የኢትዮጵያውያን የፍቅር ጓደኛ ማገናኛ ቦት።</p>
            </div>

            <div class="w-24 h-24 rounded-full bg-botOrange flex items-center justify-center text-white text-3xl font-bold shadow-lg mb-4" id="user-avatar">
                <span id="user-initial">?</span>
            </div>
            
            <h2 class="text-2xl font-bold text-buna" id="user-name">Loading...</h2>
            <p class="text-botOrange font-medium mb-8" id="profile-status">Connecting to secure server...</p>

            <button id="start-btn" class="btn-primary w-full max-w-sm py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95 hidden">
                Start Swiping
            </button>
        </div>

        <!-- VIEW 2: SWIPE INTERFACE (NEW!) -->
        <div id="view-swipe" class="hidden w-full flex flex-col items-center h-screen pt-4 pb-8">
            <!-- Mini Header -->
            <div class="flex justify-between items-center w-full max-w-sm px-2 mb-4">
                <h2 class="text-xl font-bold text-botOrange">ሀበሻ ቀጠሮ</h2>
                <i class="ph ph-sliders-horizontal text-2xl text-gray-500"></i>
            </div>

            <!-- Card Stack -->
            <div class="card-stack" id="card-container">
                <!-- Cards will be injected here by JavaScript -->
            </div>

            <!-- Action Buttons -->
            <div class="flex justify-center items-center gap-6 mt-8 w-full max-w-sm">
                <button id="btn-pass" class="w-16 h-16 bg-white rounded-full shadow-lg flex items-center justify-center text-red-500 transition-transform active:scale-90 border border-gray-100">
                    <i class="ph ph-x text-3xl font-bold"></i>
                </button>
                <button id="btn-superlike" class="w-12 h-12 bg-white rounded-full shadow-md flex items-center justify-center text-blue-500 transition-transform active:scale-90 border border-gray-100">
                    <i class="ph ph-star text-2xl font-bold"></i>
                </button>
                <button id="btn-like" class="w-16 h-16 bg-white rounded-full shadow-lg flex items-center justify-center text-green-500 transition-transform active:scale-90 border border-gray-100">
                    <i class="ph ph-heart text-3xl font-bold"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        // 1. Initialize Telegram Mini App
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        // 2. Constants & Variables
        const BACKEND_URL = "https://habesha-backend-xhc5.onrender.com"; 
        let userTelegramData = null;

        // View Elements
        const viewWelcome = document.getElementById('view-welcome');
        const viewSwipe = document.getElementById('view-swipe');
        const startBtn = document.getElementById('start-btn');
        const profileStatus = document.getElementById('profile-status');
        const cardContainer = document.getElementById('card-container');

        // Mock Profiles (So you can see how it looks before users join!)
        const profiles = [
            { id: 1, name: "Helen", age: 24, location: "Addis Ababa", profession: "Architect", bio: "Looking for a serious connection. I love weekend getaways to Kuriftu.", image: "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=500&h=700&fit=crop" },
            { id: 2, name: "Beti", age: 26, location: "Bole", profession: "Banker", bio: "Macchiato dates and deep conversations are my favorite.", image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500&h=700&fit=crop" },
            { id: 3, name: "Saron", age: 23, location: "Hawassa", profession: "Software Engineer", bio: "Tech geek by day, food lover by night.", image: "https://images.unsplash.com/photo-1541216970279-affbf182e0d3?w=500&h=700&fit=crop" }
        ];
        let currentCardIndex = 0;

        // 3. User Initialization
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userTelegramData = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = userTelegramData.first_name + (userTelegramData.last_name ? ' ' + userTelegramData.last_name.charAt(0) + '.' : '');
            document.getElementById('user-initial').innerText = userTelegramData.first_name.charAt(0);
            
            profileStatus.innerText = "Profile securely loaded!";
            profileStatus.classList.remove("text-botOrange");
            profileStatus.classList.add("text-green-500");
            startBtn.classList.remove('hidden');
        } else {
            document.getElementById('user-name').innerText = "Test Mode";
            profileStatus.innerText = "Not in Telegram. Open via Bot!";
            startBtn.classList.remove('hidden'); // Allow testing in browser
        }

        // 4. Navigation to Swipe Screen
        startBtn.addEventListener('click', () => {
            viewWelcome.classList.add('hidden');
            viewSwipe.classList.remove('hidden');
            renderCards();
        });

        // 5. Swipe Logic
        function renderCards() {
            cardContainer.innerHTML = ''; // Clear container
            
            if (currentCardIndex >= profiles.length) {
                cardContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full bg-white rounded-2xl shadow-sm border border-gray-100">
                        <i class="ph ph-magnifying-glass text-5xl text-gray-300 mb-2"></i>
                        <p class="text-gray-500 font-medium">No more profiles nearby.</p>
                        <p class="text-sm text-gray-400 mt-1">Check back later!</p>
                    </div>`;
                return;
            }

            // Render remaining profiles backwards so the first one is on top
            for (let i = profiles.length - 1; i >= currentCardIndex; i--) {
                const profile = profiles[i];
                const zIndex = profiles.length - i;
                const scale = i === currentCardIndex ? 1 : 0.95;
                const topOffset = i === currentCardIndex ? 0 : 10; // Stack effect

                const cardHTML = `
                    <div class="swipe-card" id="card-${i}" style="z-index: ${zIndex}; transform: scale(${scale}) translateY(${topOffset}px);">
                        <img src="${profile.image}" alt="${profile.name}">
                        <div class="card-content text-left">
                            <h2 class="text-2xl font-bold text-buna">${profile.name}, <span class="font-normal text-gray-600">${profile.age}</span></h2>
                            <p class="text-sm text-gray-500 flex items-center gap-1 mt-1">
                                <i class="ph-fill ph-map-pin text-botOrange"></i> ${profile.location} • ${profile.profession}
                            </p>
                            <p class="text-sm text-gray-700 mt-2 line-clamp-2">${profile.bio}</p>
                        </div>
                    </div>
                `;
                cardContainer.insertAdjacentHTML('beforeend', cardHTML);
            }
        }

        function handleSwipe(direction) {
            if (currentCardIndex >= profiles.length) return;
            
            const currentCard = document.getElementById(`card-${currentCardIndex}`);
            
            // Add animation class based on direction
            if (direction === 'left') {
                currentCard.classList.add('swipe-left');
                tg.HapticFeedback.impactOccurred('light');
            } else {
                currentCard.classList.add('swipe-right');
                tg.HapticFeedback.impactOccurred('medium'); // Stronger vibrate for a 'like'
            }

            // Wait for animation to finish, then show next card
            setTimeout(() => {
                currentCardIndex++;
                renderCards();
                
                if(direction === 'right') {
                    // Temporary alert for testing
                    if(Math.random() > 0.5) {
                        tg.showAlert("🎉 It's a Match! You and " + profiles[currentCardIndex-1].name + " liked each other.");
                    }
                }
            }, 300); // 300ms matches the CSS transition time
        }

        // Button Event Listeners
        document.getElementById('btn-pass').addEventListener('click', () => handleSwipe('left'));
        document.getElementById('btn-like').addEventListener('click', () => handleSwipe('right'));
        document.getElementById('btn-superlike').addEventListener('click', () => {
            tg.showAlert("Super Like requires Premium! ⭐️");
        });

    </script>
</body>
</html>
