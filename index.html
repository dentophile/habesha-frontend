    <script>
        // ... (existing logic)

        function showView(view) {
            document.getElementById('view-swipe').classList.add('hidden');
            document.getElementById('view-matches').classList.add('hidden');
            document.getElementById('view-chat').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            
            if(view === 'matches') loadMatches();
        }

        async function loadMatches() {
            // Call the new /api/matches-list endpoint
            const res = await fetch(`${BACKEND_URL}/api/matches-list/${userTelegramData.id}`);
            const data = await res.json();
            const list = document.getElementById('matches-list');
            list.innerHTML = data.matches.map(m => `
                <div onclick="openChat('${m.id}', '${m.name}')" class="p-4 bg-white rounded shadow flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-botOrange text-white flex items-center justify-center">${m.name[0]}</div>
                    <p class="font-bold">${m.name}</p>
                </div>
            `).join('');
        }
    </script>
