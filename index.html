<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habesha Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { botOrange: '#FF952B', buna: '#2C1E16' } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-hidden text-buna">

    <!-- Custom Alert Box (To avoid native alerts) -->
    <div id="custom-alert" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-50 px-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-2">Notice</h3>
            <p id="custom-alert-msg" class="text-gray-600 mb-6"></p>
            <button onclick="closeAlert()" class="w-full p-3 bg-botOrange text-white rounded-xl font-bold">OK</button>
        </div>
    </div>

    <!-- Loading View -->
    <div id="view-loading" class="w-full h-screen flex flex-col items-center justify-center p-6 transition-opacity duration-300">
        <i class="ph-fill ph-spinner-gap animate-spin text-5xl text-botOrange mb-4"></i>
        <p class="text-gray-500 font-medium">Loading...</p>
    </div>

    <!-- Registration / Edit View -->
    <div id="view-registration" class="hidden w-full h-screen bg-white overflow-y-auto no-scrollbar pb-24">
        <div class="max-w-md mx-auto p-6 py-10">
            <h2 id="reg-title" class="text-3xl font-bold text-buna mb-2 text-center transition-all">Step 1: Basics</h2>
            
            <!-- Progress Bar -->
            <div class="w-full bg-gray-200 h-2 rounded-full mb-8 overflow-hidden">
                <div id="progress-bar" class="bg-botOrange h-full w-1/3 transition-all duration-300"></div>
            </div>

            <!-- Page 1: Basics -->
            <div id="page-1" class="space-y-4 transition-all">
                <div class="mb-6 flex flex-col items-center justify-center bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl h-32 w-32 mx-auto cursor-pointer hover:bg-gray-200 transition">
                    <i class="ph ph-camera text-3xl text-gray-500 mb-1"></i>
                    <span class="text-xs text-gray-500">Upload Photo</span>
                </div>
                
                <input id="reg-name" type="text" placeholder="Nickname (Optional)" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange focus:ring-1 focus:ring-botOrange">
                
                <div class="flex gap-2">
                    <select id="reg-gender" class="w-1/2 p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                        <option value="">Gender</option>
                        <option value="Man">Man</option>
                        <option value="Woman">Woman</option>
                    </select>
                    <input id="reg-age" type="number" placeholder="Age (18+)" min="18" class="w-1/2 p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                </div>
                
                <select id="reg-interest" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Interested In</option>
                    <option value="Women">Women</option>
                    <option value="Men">Men</option>
                    <option value="Everyone">Everyone</option>
                </select>

                <select id="reg-intention" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Looking For</option>
                    <option value="Marriage">Marriage</option>
                    <option value="Serious Relationship">Serious Relationship</option>
                    <option value="Casual Dating">Casual Dating</option>
                    <option value="Friendship">Friendship</option>
                </select>
                
                <select id="reg-location" onchange="toggleOtherLocation()" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Living City</option>
                    <option value="Addis Ababa">Addis Ababa</option>
                    <option value="Bahir Dar">Bahir Dar</option>
                    <option value="Hawassa">Hawassa</option>
                    <option value="Adama">Adama</option>
                    <option value="Diaspora">Diaspora</option>
                    <option value="Other">Other</option>
                </select>
                
                <input id="reg-location-other" type="text" placeholder="Please type your city" class="hidden w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange focus:ring-1 focus:ring-botOrange">
                
                <button onclick="validateAndNext(1)" class="w-full p-4 bg-botOrange text-white rounded-xl font-bold hover:bg-opacity-90 transition shadow-md">Next</button>
            </div>

            <!-- Page 2: Details & Lifestyle -->
            <div id="page-2" class="hidden space-y-4 transition-all">
                <input id="reg-height" type="text" placeholder="Height (e.g. 1.70m)" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                
                <select id="reg-religion" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Religion</option>
                    <option value="Orthodox">Orthodox</option>
                    <option value="Muslim">Muslim</option>
                    <option value="Protestant">Protestant</option>
                    <option value="Catholic">Catholic</option>
                    <option value="Other">Other</option>
                </select>
                
                <select id="reg-education" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Education</option>
                    <option value="Uneducated">Uneducated</option>
                    <option value="High School">High School</option>
                    <option value="Bachelor's">Bachelor's</option>
                    <option value="Master's">Master's</option>
                </select>
                
                <input id="reg-occupation" type="text" placeholder="Occupation" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">

                <select id="reg-kids" class="w-full p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                    <option value="">Kids</option>
                    <option value="Don't have kids">Don't have kids</option>
                    <option value="Have kids">Have kids</option>
                    <option value="Want someday">Want someday</option>
                    <option value="Don't want kids">Don't want kids</option>
                </select>

                <div class="flex gap-2">
                    <select id="reg-drinking" class="w-1/2 p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                        <option value="">Drinking</option>
                        <option value="No">No</option>
                        <option value="Socially">Socially</option>
                        <option value="Yes">Yes</option>
                    </select>
                    <select id="reg-smoking" class="w-1/2 p-4 border rounded-xl bg-gray-50 focus:outline-none focus:border-botOrange">
                        <option value="">Smoking</option>
                        <option value="No">No</option>
                        <option value="Occasionally">Occasionally</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="goToPage(1)" class="w-1/3 p-4 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition">Back</button>
                    <button onclick="validateAndNext(2)" class="w-2/3 p-4 bg-botOrange text-white rounded-xl font-bold hover:bg-opacity-90 transition shadow-md">Next</button>
                </div>
            </div>

            <!-- Page 3: Bio -->
            <div id="page-3" class="hidden space-y-4 transition-all">
                <textarea id="reg-bio" placeholder="Tell us about yourself... (Hobbies, what you're looking for)" class="w-full p-4 border rounded-xl bg-gray-50 h-32 focus:outline-none focus:border-botOrange resize-none"></textarea>
                
                <div class="flex gap-2">
                    <button onclick="goToPage(2)" class="w-1/3 p-4 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition">Back</button>
                    <button id="submit-btn" onclick="submitRegistration()" class="w-2/3 p-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition shadow-md flex justify-center items-center gap-2">
                        <span>Complete</span>
                        <i class="ph-bold ph-check-circle"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Swipe View -->
    <div id="view-swipe" class="hidden w-full h-screen pt-4 pb-24 px-4 flex-col bg-gray-100 overflow-hidden">
        <!-- Header with Edit Button -->
        <div class="w-full max-w-sm mx-auto flex justify-between items-center mb-4 mt-2">
            <h2 class="font-bold text-2xl text-buna">Discover</h2>
            <button onclick="openEditProfile()" class="text-botOrange text-sm font-bold flex items-center gap-1.5 bg-white px-4 py-2 rounded-full shadow-sm hover:bg-gray-50 transition">
                <i class="ph-bold ph-user-circle-gear text-lg"></i> Edit Profile
            </button>
        </div>

        <div id="card-container" class="relative w-full max-w-sm mx-auto flex items-center justify-center h-full min-h-[60vh] max-h-[75vh] bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
            <p class="text-gray-400 font-medium">No more profiles to show.</p>
        </div>
    </div>

    <!-- Matches View -->
    <div id="view-matches" class="hidden w-full h-screen pt-4 pb-24 px-4 flex-col bg-gray-50 overflow-y-auto">
        <h2 class="font-bold text-3xl text-buna mb-6 mt-4 px-2">Your Matches <span class="text-botOrange">❤️</span></h2>
        <div id="matches-container" class="w-full max-w-sm mx-auto space-y-4 pb-10">
            <p class="text-gray-400 text-center mt-10">Loading matches...</p>
        </div>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="hidden w-full h-screen bg-gray-50 flex-col z-[60] fixed top-0 left-0 overflow-hidden">
        <!-- Chat Header -->
        <div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-3 shadow-sm shrink-0">
            <button onclick="closeChat()" class="text-gray-500 p-2 -ml-2 rounded-full hover:bg-gray-100 active:bg-gray-200 transition">
                <i class="ph-bold ph-arrow-left text-2xl"></i>
            </button>
            <div class="w-10 h-10 rounded-full bg-cover bg-center bg-gray-200" id="chat-header-photo"></div>
            <div class="flex-1">
                <h3 class="font-bold text-buna truncate" id="chat-header-name">Name</h3>
                <p class="text-xs text-green-500 font-medium">Matched!</p>
            </div>
            <button class="text-gray-400 hover:text-botOrange p-2">
                <i class="ph-bold ph-dots-three-vertical text-2xl"></i>
            </button>
        </div>

        <!-- Chat Messages Container -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
            <!-- Messages will be injected here -->
        </div>

        <!-- Chat Input Area -->
        <div class="bg-white border-t border-gray-200 p-3 flex gap-2 items-center shrink-0">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)" class="flex-1 bg-gray-100 border-transparent focus:bg-white focus:border-botOrange focus:ring-1 focus:ring-botOrange rounded-full px-4 py-3 outline-none transition">
            <button onclick="sendMessage()" class="w-12 h-12 bg-botOrange text-white rounded-full flex items-center justify-center hover:bg-orange-500 active:scale-95 transition shadow-sm shrink-0">
                <i class="ph-fill ph-paper-plane-right text-xl"></i>
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div id="bottom-nav" class="hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 pb-6 z-50 rounded-t-3xl shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('swipe')" id="tab-swipe" class="flex flex-col items-center text-botOrange transition-colors">
            <i class="ph-bold ph-cards text-2xl mb-1"></i>
            <span class="text-xs font-bold">Discover</span>
        </button>
        <button onclick="switchTab('matches')" id="tab-matches" class="flex flex-col items-center text-gray-400 hover:text-botOrange transition-colors">
            <i class="ph-bold ph-chats-circle text-2xl mb-1"></i>
            <span class="text-xs font-bold">Matches</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const BACKEND_URL = "https://habesha-backend-xhc5.onrender.com";
        const cleanTelegramId = String(tg.initDataUnsafe?.user?.id || Math.random()).trim();
        let selectedPhotoUrl = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80";
        
        let isEditing = false;
        let profiles = [];
        let currentCardIndex = 0;
        let activeChatId = null;

        // Fallback alert wrapper
        function showAlert(message) {
            if (tg.showAlert) {
                tg.showAlert(message);
            } else {
                document.getElementById('custom-alert-msg').innerText = message;
                document.getElementById('custom-alert').classList.remove('hidden');
            }
        }

        function closeAlert() {
            document.getElementById('custom-alert').classList.add('hidden');
        }

        async function initApp() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/check-user/${cleanTelegramId}`);
                const data = await response.json();
                
                document.getElementById('view-loading').classList.add('hidden');
                
                if (!data.exists) {
                    document.getElementById('reg-name').value = tg.initDataUnsafe?.user?.first_name || "";
                    document.getElementById('view-registration').classList.remove('hidden');
                } else {
                    document.getElementById('view-swipe').classList.remove('hidden');
                    document.getElementById('bottom-nav').classList.remove('hidden'); 
                    
                    await loadDiscoverProfiles();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('view-loading').innerHTML = `
                    <i class="ph-fill ph-warning-circle text-5xl text-red-500 mb-4"></i>
                    <p class="text-red-500 font-bold">Failed to connect to server.</p>
                    <p class="text-gray-500 text-sm mt-2">Please try again later.</p>`;
            }
        }

        async function loadDiscoverProfiles() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/get-potential-matches/${cleanTelegramId}`);
                const data = await res.json();
                profiles = data.matches || [];
                renderCards();
            } catch (e) {
                console.error("Failed to load profiles", e);
                profiles = [];
                renderCards();
            }
        }

        function renderCards() {
            const container = document.getElementById('card-container');
            
            if (currentCardIndex >= profiles.length || profiles.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-6">
                        <i class="ph-duotone ph-sparkle text-6xl text-gray-300 mb-2"></i>
                        <p class="text-gray-400 font-medium">You've seen everyone in your area.</p>
                        <p class="text-gray-400 text-sm mt-2">Check back later for more profiles!</p>
                    </div>`;
                return;
            }

            const profile = profiles[currentCardIndex];
            const photoToUse = profile.photo_url || "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=400&q=80";

            container.innerHTML = `
                <div class="w-full h-full flex flex-col">
                    <div class="flex-1 bg-gray-200 bg-cover bg-center" style="background-image: url('${photoToUse}')"></div>
                    <div class="p-4 bg-white flex-shrink-0">
                        <h3 class="text-xl font-bold">${profile.name}, ${profile.age || '?'}</h3>
                        <p class="text-gray-500 text-sm mt-1">${profile.bio || 'Ready to mingle!'}</p>
                    </div>
                    
                    <div class="mt-auto w-full flex justify-around pt-6 pb-6 bg-white border-t border-gray-50">
                        <button onclick="handleSwipe(false)" class="w-14 h-14 bg-white border-2 border-red-100 rounded-full flex items-center justify-center text-red-500 shadow-md active:scale-95 transition-transform">
                            <i class="ph-bold ph-x text-2xl"></i>
                        </button>
                        <button onclick="handleSwipe(true)" class="w-14 h-14 bg-gradient-to-tr from-botOrange to-orange-400 rounded-full flex items-center justify-center text-white shadow-lg shadow-orange-200 active:scale-95 transition-transform">
                            <i class="ph-fill ph-heart text-2xl"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        async function handleSwipe(isLike) {
            const swiperId = cleanTelegramId;
            const swipedId = profiles[currentCardIndex].telegram_id; 

            try {
                const response = await fetch(`${BACKEND_URL}/api/swipe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ swiper_id: swiperId, swiped_id: swipedId, is_like: isLike })
                });
                
                const data = await response.json();
                if (data.match) {
                    showAlert("It's a Match! ❤️");
                }
            } catch (e) {
                console.error("Swipe failed:", e);
            }
            
            nextCard();
        }

        function nextCard() {
            currentCardIndex++;
            renderCards();
        }

        function switchTab(tab) {
            document.getElementById('view-swipe').classList.add('hidden');
            document.getElementById('view-matches').classList.add('hidden');
            
            document.getElementById('tab-swipe').classList.replace('text-botOrange', 'text-gray-400');
            document.getElementById('tab-matches').classList.replace('text-botOrange', 'text-gray-400');
            
            if (tab === 'swipe') {
                document.getElementById('view-swipe').classList.remove('hidden');
                document.getElementById('tab-swipe').classList.replace('text-gray-400', 'text-botOrange');
            } else if (tab === 'matches') {
                document.getElementById('view-matches').classList.remove('hidden');
                document.getElementById('tab-matches').classList.replace('text-gray-400', 'text-botOrange');
                loadMatchesList();
            }
        }

        async function loadMatchesList() {
            const container = document.getElementById('matches-container');
            container.innerHTML = `<div class="flex justify-center mt-10"><i class="ph ph-spinner animate-spin text-3xl text-botOrange"></i></div>`;
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/matches-list/${cleanTelegramId}`);
                const data = await response.json();
                
                if (!data.matches || data.matches.length === 0) {
                    container.innerHTML = `
                        <div class="text-center mt-10">
                            <i class="ph-duotone ph-ghost text-6xl text-gray-300 mb-2"></i>
                            <p class="text-gray-500 font-medium">No matches yet. Keep swiping!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = data.matches.map(match => `
                    <div onclick="openChat('${match.telegram_id}', '${match.name.replace(/'/g, "\\'")}', '${match.photo_url || "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80"}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer hover:bg-gray-50 transition active:scale-95">
                        <div class="w-16 h-16 rounded-full bg-gray-200 flex-shrink-0 bg-cover bg-center" style="background-image: url('${match.photo_url || "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80"}')"></div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-lg text-buna truncate">${match.name}</h4>
                            <p class="text-sm text-gray-500 truncate">${match.bio || "Say hi!"}</p>
                        </div>
                        <div class="w-10 h-10 bg-orange-50 text-botOrange rounded-full flex items-center justify-center flex-shrink-0">
                            <i class="ph-fill ph-chat-teardrop-text text-xl"></i>
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-500 text-center mt-10">Failed to load matches.</p>`;
            }
        }

        // --- Chat Functions ---

        function openChat(matchId, matchName, matchPhoto) {
            activeChatId = matchId;
            
            // Set Header info
            document.getElementById('chat-header-name').innerText = matchName;
            document.getElementById('chat-header-photo').style.backgroundImage = `url('${matchPhoto}')`;
            
            // Show Chat View
            document.getElementById('view-chat').classList.replace('hidden', 'flex');
            
            // Clear or load mock messages
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = `
                <div class="text-center text-xs text-gray-400 my-4">Today</div>
                <div class="flex justify-start">
                    <div class="bg-white border border-gray-100 text-buna px-4 py-2 rounded-2xl rounded-tl-sm shadow-sm max-w-[75%]">
                        You matched with ${matchName}! Break the ice.
                    </div>
                </div>
            `;
            
            // TODO in future step: Fetch message history from backend here
        }

        function closeChat() {
            activeChatId = null;
            document.getElementById('view-chat').classList.replace('flex', 'hidden');
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if (!messageText) return;
            
            const messagesContainer = document.getElementById('chat-messages');
            
            // Add user message directly to UI
            messagesContainer.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-botOrange text-white px-4 py-2 rounded-2xl rounded-tr-sm shadow-sm max-w-[75%] break-words">
                        ${messageText}
                    </div>
                </div>
            `;
            
            // Auto-scroll to latest message
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Clear input field
            input.value = '';
            
            // TODO in future step: Send this message to backend via fetch to save it
        }

        // --- Registration & Edit Functions ---

        function toggleOtherLocation() {
            const select = document.getElementById('reg-location');
            const otherInput = document.getElementById('reg-location-other');
            
            if (select.value === 'Other') {
                otherInput.classList.remove('hidden');
            } else {
                otherInput.classList.add('hidden');
                otherInput.value = '';
            }
        }

        function validateAndNext(currentStep) {
            if (currentStep === 1) {
                const gender = document.getElementById('reg-gender').value;
                const age = document.getElementById('reg-age').value;
                const interest = document.getElementById('reg-interest').value;
                const intention = document.getElementById('reg-intention').value;
                
                let location = document.getElementById('reg-location').value;
                if (location === 'Other') {
                    location = document.getElementById('reg-location-other').value.trim();
                }

                if (!gender || !age || !interest || !intention || !location) {
                    return showAlert("Please fill out all required basic fields.");
                }
                if (age < 18) {
                    return showAlert("You must be at least 18 years old to use Habesha Date.");
                }
                goToPage(2);
            } 
            else if (currentStep === 2) {
                const height = document.getElementById('reg-height').value.trim();
                const religion = document.getElementById('reg-religion').value;
                const education = document.getElementById('reg-education').value;
                const kids = document.getElementById('reg-kids').value;
                const drinking = document.getElementById('reg-drinking').value;
                const smoking = document.getElementById('reg-smoking').value;
                
                if (!height || !religion || !education || !kids || !drinking || !smoking) {
                    return showAlert("Please fill out all detail and lifestyle fields.");
                }
                goToPage(3);
            }
        }

        function goToPage(step) {
            document.getElementById('page-1').classList.add('hidden');
            document.getElementById('page-2').classList.add('hidden');
            document.getElementById('page-3').classList.add('hidden');
            
            document.getElementById('page-' + step).classList.remove('hidden');
            
            const titles = isEditing 
                ? ["Edit Profile: Basics", "Edit Profile: Details", "Edit Profile: Bio"] 
                : ["Step 1: Basics", "Step 2: Details", "Step 3: Bio"];
                
            const progress = ["33.3%", "66.6%", "100%"];
            
            document.getElementById('reg-title').innerText = titles[step - 1];
            document.getElementById('progress-bar').style.width = progress[step - 1];
        }

        function openEditProfile() {
            isEditing = true;
            document.getElementById('view-swipe').classList.add('hidden');
            document.getElementById('view-matches').classList.add('hidden');
            document.getElementById('bottom-nav').classList.add('hidden'); 
            document.getElementById('view-registration').classList.remove('hidden');
            
            goToPage(1); 
            document.getElementById('submit-btn').innerHTML = `<span>Update Profile</span><i class="ph-bold ph-check-circle"></i>`;
        }

        async function submitRegistration() {
            const bio = document.getElementById('reg-bio').value.trim();
            if(!bio) return showAlert("Please write a short bio to help others get to know you!");

            let finalLocation = document.getElementById('reg-location').value;
            if (finalLocation === 'Other') {
                finalLocation = document.getElementById('reg-location-other').value.trim();
            }

            let finalName = document.getElementById('reg-name').value.trim();
            if (!finalName) {
                finalName = tg.initDataUnsafe?.user?.first_name || "Anonymous";
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Saving...`;
            submitBtn.disabled = true;

            const payload = {
                telegram_id: cleanTelegramId,
                name: finalName,
                age: parseInt(document.getElementById('reg-age').value),
                gender: document.getElementById('reg-gender').value,
                interested_in: document.getElementById('reg-interest').value,
                location: finalLocation, 
                height: document.getElementById('reg-height').value,
                religion: document.getElementById('reg-religion').value,
                education: document.getElementById('reg-education').value,
                occupation: document.getElementById('reg-occupation').value,
                bio: bio,
                photo_url: selectedPhotoUrl,
                intention: document.getElementById('reg-intention').value,
                kids: document.getElementById('reg-kids').value,
                drinking: document.getElementById('reg-drinking').value,
                smoking: document.getElementById('reg-smoking').value
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Server Error");
                }
                
                isEditing = false;
                document.getElementById('view-registration').classList.add('hidden');
                
                document.getElementById('view-swipe').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                
                await loadDiscoverProfiles();
                
                submitBtn.innerHTML = `<span>Complete</span><i class="ph-bold ph-check-circle"></i>`;
                submitBtn.disabled = false;
                
                showAlert("Profile successfully saved!");
            } catch (err) {
                showAlert("Failed to save profile: " + err.message);
                submitBtn.innerHTML = isEditing ? `<span>Update Profile</span><i class="ph-bold ph-check-circle"></i>` : `<span>Complete</span><i class="ph-bold ph-check-circle"></i>`;
                submitBtn.disabled = false;
            }
        }

        // Kick off the app
        initApp();
    </script>
</body>
</html>
