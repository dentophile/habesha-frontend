<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habesha Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { botOrange: '#FF952B', buna: '#2C1E16' } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans overflow-hidden">

    <div id="view-loading" class="w-full h-screen flex flex-col items-center justify-center p-6">
        <i class="ph-fill ph-spinner-gap animate-spin text-4xl text-botOrange mb-4"></i>
        <p class="text-gray-500 font-medium">Loading...</p>
    </div>

    <div id="view-registration" class="hidden w-full h-screen bg-white overflow-y-auto no-scrollbar">
        <div class="max-w-md mx-auto p-6 py-10 pb-24">
            <h2 id="reg-title" class="text-3xl font-bold text-buna mb-2 text-center">Step 1: Basics</h2>
            <div class="w-full bg-gray-200 h-2 rounded-full mb-8 overflow-hidden">
                <div id="progress-bar" class="bg-botOrange h-full w-1/3 transition-all duration-300"></div>
            </div>

            <div id="page-1" class="space-y-4">
                <div class="mb-6" id="photo-selector"></div>
                <input id="reg-name" type="text" placeholder="Full Name" class="w-full p-4 border rounded-xl bg-gray-50">
                <div class="flex gap-2">
                    <select id="reg-gender" class="w-1/2 p-4 border rounded-xl bg-gray-50"><option value="">Gender</option><option>Man</option><option>Woman</option></select>
                    <input id="reg-age" type="number" placeholder="Age (18+)" min="18" class="w-1/2 p-4 border rounded-xl bg-gray-50">
                </div>
                <select id="reg-interest" class="w-full p-4 border rounded-xl bg-gray-50"><option value="">Interested In</option><option>Women</option><option>Men</option><option>Everyone</option></select>
                <select id="reg-location" class="w-full p-4 border rounded-xl bg-gray-50"><option value="">Living City</option><option>Addis Ababa</option><option>Bahir Dar</option><option>Hawassa</option><option>Adama</option><option>Diaspora</option></select>
                <button onclick="nextPage(2)" class="w-full p-4 bg-botOrange text-white rounded-xl font-bold">Next</button>
            </div>

            <div id="page-2" class="hidden space-y-4">
                <input id="reg-height" type="text" placeholder="Height (e.g. 1.70m)" class="w-full p-4 border rounded-xl bg-gray-50">
                <select id="reg-religion" class="w-full p-4 border rounded-xl bg-gray-50"><option value="">Religion</option><option>Orthodox</option><option>Muslim</option><option>Protestant</option><option>Catholic</option></select>
                <select id="reg-education" class="w-full p-4 border rounded-xl bg-gray-50"><option value="">Education</option><option>High School</option><option>Bachelor's</option><option>Master's</option></select>
                <input id="reg-occupation" type="text" placeholder="Occupation" class="w-full p-4 border rounded-xl bg-gray-50">
                <button onclick="nextPage(3)" class="w-full p-4 bg-botOrange text-white rounded-xl font-bold">Next</button>
            </div>

            <div id="page-3" class="hidden space-y-4">
                <textarea id="reg-bio" placeholder="Tell us about yourself..." class="w-full p-4 border rounded-xl bg-gray-50 h-32"></textarea>
                <button onclick="submitRegistration()" class="w-full p-4 bg-green-600 text-white rounded-xl font-bold">Complete Registration</button>
            </div>
        </div>
    </div>

    <div id="view-swipe" class="hidden w-full h-screen pt-4 pb-20 px-4 flex-col">
        <div id="card-container" class="relative w-full max-w-sm mx-auto flex items-center justify-center h-full"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://habesha-backend-xhc5.onrender.com";
        const cleanTelegramId = String(tg.initDataUnsafe?.user?.id || Math.random()).trim();
        let selectedPhotoUrl = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80";

        // Initialize App
        async function initApp() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/check-user/${cleanTelegramId}`);
                const data = await response.json();
                document.getElementById('view-loading').classList.add('hidden');
                if (!data.exists) {
                    document.getElementById('reg-name').value = tg.initDataUnsafe?.user?.first_name || "";
                    document.getElementById('view-registration').classList.remove('hidden');
                } else {
                    document.getElementById('view-swipe').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('view-loading').innerHTML = `<p class="text-red-500">Backend Offline</p>`;
            }
        }

        function nextPage(step) {
            if(step === 2 && document.getElementById('reg-age').value < 18) return alert("Must be 18+");
            document.getElementById('page-1').classList.add('hidden');
            document.getElementById('page-2').classList.add('hidden');
            document.getElementById('page-3').classList.add('hidden');
            document.getElementById('page-' + step).classList.remove('hidden');
            document.getElementById('progress-bar').style.width = (step * 33) + '%';
        }

        async function submitRegistration() {
            const payload = {
                telegram_id: cleanTelegramId,
                name: document.getElementById('reg-name').value,
                age: parseInt(document.getElementById('reg-age').value),
                gender: document.getElementById('reg-gender').value,
                interested_in: document.getElementById('reg-interest').value,
                location: document.getElementById('reg-location').value,
                height: document.getElementById('reg-height').value,
                religion: document.getElementById('reg-religion').value,
                education: document.getElementById('reg-education').value,
                occupation: document.getElementById('reg-occupation').value,
                bio: document.getElementById('reg-bio').value,
                photo_url: selectedPhotoUrl
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Server Error");
                }
                document.getElementById('view-registration').classList.add('hidden');
                document.getElementById('view-swipe').classList.remove('hidden');
            } catch (err) {
                alert("Registration failed: " + err.message);
            }
        }

        initApp();
    </script>
</body>
</html>
